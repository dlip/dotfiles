abbreviation_file: ~/.config/abbrgen/abbreviations.csv
generator_options:
  qmk:
    alt1_keys:
    - KC_COMBO_ALT1
generators:
- qmk
keyboard: standard
keyboard_options:
  standard:
    layout: engram
    same_column_combo_penalty: 2
    same_row_combo_penalty: 2
    scissor_penalty: 3
    stagger: column
min_word_length: 3
overwrite_alts: false
