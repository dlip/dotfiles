chords_file: ~/.config/chordgen/chords.csv
keyboard: standard
keyboard_options:
  directional:
    custom_layout:
    - _X__X__X__X__X__X__X__X_
    - X_XX_XX_XX_XX_XX_XX_XX_X
    - _X__X__X__X__X__X__X__X_
    - _X__X_
    - X_XX_X
    - _X__X_
    - _X__X_
    - X_XX_X
    - _X__X_
    directional_change_penalty: 2
    layout: charachorder
    style: five_way_switch
  standard:
    custom_layout:
    - _byou'"ldvw_
    - _ciea,.htsn_
    - _gxjk-?rmfp_
    - ____
    layout: custom
    same_column_chord_penalty: 2
    same_row_chord_penalty: 2
    scissor_penalty: 3
    stagger: column
min_chord_length: 0
min_word_length: 3
output_options:
  kanata:
    alt1_keys:
    - lalt
    alt2_keys:
    - spc
    alt3_keys:
    - lalt
    - spc
    chord_keys:
    - prtsc
    chord_timeout: 100
    file: ~/.config/chordgen/kanata_chords.kbd
    key_mapping:
      ' ': spc
      a: d
      b: tab
      c: caps
      d: o
      e: s
      f: /
      g: lsft
      h: k
      i: a
      j: x
      k: c
      l: i
      m: .
      n: ''''
      o: w
      p: rsft
      r: ','
      s: ;
      t: l
      u: e
      v: '['
      w: p
      x: z
      y: q
    limit: 0
    shift_keys:
    - ralt
  qmk:
    alt1_keys:
    - KC_COMBO_ALT1
    alt2_keys:
    - KC_COMBO_ALT2
    alt3_keys:
    - KC_COMBO_ALT1
    - KC_COMBO_ALT2
    chord_keys:
    - KC_COMBO
    file: ~/.config/chordgen/qmk_chords.def
    key_codes:
      A: KC_CTL_A
      C: KC_SFT_C
      E: KC_GUI_E
      H: KC_CTL_H
      I: KC_ALT_I
      J: KC_CAG_J
      M: KC_CAG_M
      N: KC_SFT_N
      S: KC_ALT_S
      T: KC_GUI_T
    shift_keys:
    - KC_COMBO_SFT
  training:
    file: ~/.config/chordgen/training.txt
  zmk:
    alt1_keys:
    - COMBO_ALT1
    alt2_keys:
    - COMBO_ALT2
    alt3_keys:
    - COMBO_ALT1
    - COMBO_ALT2
    chord_keys:
    - COMBO
    chord_timeout: 100
    chords_file: ~/.config/chordgen/zmk_chords.dtsi
    key_positions:
    - - ''
      - Q
      - W
      - E
      - R
      - T
      - Y
      - U
      - I
      - O
      - P
      - ''
    - - ''
      - A
      - S
      - D
      - F
      - G
      - H
      - J
      - K
      - L
      - ;
      - ''
    - - ''
      - Z
      - X
      - C
      - V
      - B
      - N
      - M
      - ','
      - .
      - /
      - ''
    - - ''
      - COMBO_ALT1
      - COMBO_ALT2
      - COMBO_SFT
      - COMBO
      - ''
    limit: 0
    macros_file: ~/.config/chordgen/zmk_macros.dtsi
    shift_keys:
    - COMBO_SFT
outputs:
- qmk
- zmk
- kanata
- training
overwrite_alts: false
