book:
  max_width: 70
  wpm_window_seconds: 30
drill:
  count: 25
  mode: time
  show_words: 10
  time_seconds: 30
gen:
  alts:
    adjective:
      enabled: true
      forms:
      - comparative
      - superlative
    adverb:
      enabled: true
      forms: []
    noun:
      enabled: true
      forms:
      - plural
    overwrite: false
    verb:
      enabled: true
      forms:
      - 3sg
      - past
      - gerund
  assignment:
    frequency_exponent: 4.0
    min_frequency_weight: 1.0
    priority_tiers: []
    unmatched_penalty: 10000.0
  file: ~/.config/chordgen/chords.csv
  key_replacement:
    q: k
    z: x
  keyboard:
    directional:
      custom_layout:
      - _X__X__X__X__X__X__X__X_
      - X_XX_XX_XX_XX_XX_XX_XX_X
      - _X__X__X__X__X__X__X__X_
      - _X__X_
      - X_XX_X
      - _X__X_
      - _X__X_
      - X_XX_X
      - _X__X_
      custom_layout_name: custom
      directional_change_penalty: 2
      effort_map:
      - '040030020020'
      - '695594493493'
      - '030020010010'
      - '030'
      - '192'
      - '040'
      - '030'
      - '192'
      - '040'
      layout: charachorder
    standard:
      custom_layout:
      - _byou'"dngv_
      - _hiae,.trsc_
      - _kjxw-?mlfp_
      - ____
      custom_layout_name: engram_en
      effort_map:
      - '987669'
      - '754338'
      - '987658'
      - '43'
      layout: custom
      same_column_chord_penalty: 2
      same_row_chord_penalty: 2
      scissor_penalty: 3
    type: standard
  min_chord_length: 0
  min_word_length: 3
output:
  charachorder:
    file: ~/.config/chordgen/charachorder_chords.json
  formats:
  - qmk
  - zmk
  - charachorder
  - kanata
  - training
  kanata:
    alt1_keys:
    - lalt
    alt2_keys:
    - spc
    alt3_keys:
    - lalt
    - spc
    chord_keys:
    - prtsc
    chord_timeout: 100
    file: ~/nix/keymaps/kanata/chords.kbd
    key_mapping:
      a: d
      b: tab
      c: caps
      d: o
      e: s
      f: /
      g: lsft
      h: k
      i: a
      j: x
      k: c
      l: i
      m: .
      n: ''''
      o: w
      p: rsft
      r: ','
      s: ;
      t: l
      u: e
      v: '['
      w: p
      x: z
      y: q
    limit: 0
    shifted_chord_keys:
    - prtsc
    - ralt
  qmk:
    alt1_keys:
    - KC_CHORD_ALT1
    alt2_keys:
    - KC_CHORD_ALT2
    alt3_keys:
    - KC_CHORD_ALT1
    - KC_CHORD_ALT2
    chord_keys:
    - KC_CHORD
    file: ~/code/qmk_firmware/keyboards/dlip/koumori/keymaps/engram/chords.def
    key_codes:
      A: KC_CTL_A
      C: KC_SFT_C
      E: KC_GUI_E
      H: KC_CTL_H
      I: KC_ALT_I
      J: KC_CAG_J
      M: KC_CAG_M
      N: KC_SFT_N
      S: KC_ALT_S
      T: KC_GUI_T
    shifted_chord_keys:
    - KC_CHORD
    - KC_CHORD_SFT
  training:
    file: ~/.config/chordgen/training.txt
  zmk:
    alt1_keys:
    - '!'
    alt2_keys:
    - '@'
    alt3_keys:
    - '!'
    - '@'
    chord_keys:
    - $
    chord_timeout: 100
    chords_file: ~/.config/chordgen/zmk_chords.dtsi
    key_positions:
    - _qwertyuiop_
    - _asdfghjkl;_
    - _zxcvbnm,./_
    - _!@#$_
    limit: 0
    macros_file: ~/.config/chordgen/zmk_macros.dtsi
    shifted_chord_keys:
    - $
    - '#'
theme: catppuccin-macchiato
train:
  learning_steps: 5
  leech_threshold: 8
  mastery_threshold: 3
  new_words_per_day: 3
  relearn_steps: 2
  reviews_per_day: 200
  show_chord_steps: 3
  show_words: 5
  slow_min_samples: 20
  slow_wpm_fraction: 0.7
  target_retention: 0.9
