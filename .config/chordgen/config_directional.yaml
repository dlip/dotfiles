gen:
  file: ~/.config/chordgen/chords_directional.csv
  keyboard:
    directional:
      custom_layout:
      - _X__X__X__X__X__X__X__X_
      - X_XX_XX_XX_XX_XX_XX_XX_X
      - _X__X__X__X__X__X__X__X_
      - _X__X_
      - X_XX_X
      - _X__X_
      - _X__X_
      - X_XX_X
      - _X__X_
      directional_change_penalty: 2
      layout: stained
      style: five_way_switch
    standard:
      custom_layout:
      - _byou'"ldvw_
      - _ciea,.htsn_
      - _gxjk-?rmfp_
      - ____
      layout: custom
      same_column_chord_penalty: 2
      same_row_chord_penalty: 2
      scissor_penalty: 3
      stagger: column
    type: directional
  min_chord_length: 0
  min_word_length: 3
  overwrite_alts: false
output:
  charachorder:
    file: ~/.config/chordgen/charachorder_chords.json
  formats:
  - zmk
  kanata:
    alt1_keys:
    - lalt
    alt2_keys:
    - spc
    alt3_keys:
    - lalt
    - spc
    chord_keys:
    - prtsc
    chord_timeout: 100
    file: ~/.config/chordgen/kanata_chords.kbd
    key_mapping:
      ' ': spc
      a: d
      b: tab
      c: caps
      d: o
      e: s
      f: /
      g: lsft
      h: k
      i: a
      j: x
      k: c
      l: i
      m: .
      n: ''''
      o: w
      p: rsft
      r: ','
      s: ;
      t: l
      u: e
      v: '['
      w: p
      x: z
      y: q
    limit: 0
    shift_keys:
    - ralt
  qmk:
    alt1_keys:
    - KC_CHORD_ALT1
    alt2_keys:
    - KC_CHORD_ALT2
    alt3_keys:
    - KC_CHORD_ALT1
    - KC_CHORD_ALT2
    chord_keys:
    - KC_CHORD
    file: ~/.config/chordgen/qmk_chords.def
    key_codes:
      A: KC_CTL_A
      C: KC_SFT_C
      E: KC_GUI_E
      H: KC_CTL_H
      I: KC_ALT_I
      J: KC_CAG_J
      M: KC_CAG_M
      N: KC_SFT_N
      S: KC_ALT_S
      T: KC_GUI_T
    shift_keys:
    - KC_CHORD_SFT
  training:
    file: ~/.config/chordgen/training.txt
  zmk:
    alt1_keys:
    - '!'
    alt2_keys:
    - '@'
    alt3_keys:
    - '%'
    chord_keys:
    - $
    chord_timeout: 100
    chords_file: ~/code/zmk-harite-v3/config/zmk_chords.dtsi
    key_positions:
    - ' q   f   w   o   l   u   b   z '
    - _ _ x k y h m c i g r v p j _ _
    - ' _   s   t   a   n   e   d   _ '
    - '             @   $             '
    - '            ! % # _            '
    - '             _   _             '
    - '             _   _             '
    - '            _ _ _ _            '
    - '             _   _             '
    limit: 200
    macros_file: ~/code/zmk-harite-v3/config/zmk_macros.dtsi
    shifted_chord_keys:
    - '#'
